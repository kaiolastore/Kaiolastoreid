
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIOLA STORE ID| Price List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(160deg, #000000 0%, #040d21 60%, #0a192f 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 15px;
            border-radius: 25px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .app-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 18px;
            padding: 15px 5px;
            transition: 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-item:hover {
            background: rgba(0, 210, 255, 0.15);
            transform: translateY(-3px);
            border-color: #00d2ff;
        }

        .app-item img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-bottom: 8px;
        }

        .app-item span {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #0a192f;
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 20px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .close-btn {
            position: sticky;
            top: 0;
            float: right;
            color: #ff4d4d;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
        }

        .game-header {
            color: #00d2ff;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 2px solid #00d2ff;
            padding-bottom: 5px;
            text-align: left;
        }

        .price-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .price-table td {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }

        .price-table td:last-child {
            text-align: right;
            color: #00d2ff;
            font-weight: bold;
        }

        /* Tombol Chat Stok */
        .btn-stok {
            display: block;
            width: 100%;
            background: linear-gradient(90deg, #25d366, #128c7e);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-stok:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .btn-stok i {
            margin-right: 8px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="card">

    </div>

</body>
</html>
